name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go test ./...
      - run: go vet ./...

  build:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build package
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          commit="${GITHUB_SHA}"
          date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          name="openagentsgate_${version}_${{ matrix.goos }}_${{ matrix.goarch }}"
          mkdir -p "dist/$name"
          bin="openagentsgate"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            bin="openagentsgate.exe"
          fi
          ldflags="-s -w"
          ldflags="$ldflags -X github.com/arnesssr/OpenAgentsGate/internal/buildinfo.Version=$version"
          ldflags="$ldflags -X github.com/arnesssr/OpenAgentsGate/internal/buildinfo.Commit=$commit"
          ldflags="$ldflags -X github.com/arnesssr/OpenAgentsGate/internal/buildinfo.Date=$date"
          CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build -trimpath -ldflags "$ldflags" -o "dist/$name/$bin" ./cmd/openagentsgate
          cp README.md "dist/$name/README.md"
          cp LICENSE "dist/$name/LICENSE"
          tar -C dist -czf "dist/$name.tar.gz" "$name"
      - uses: actions/upload-artifact@v4
        with:
          name: openagentsgate-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*.tar.gz
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Checksums
        run: |
          cd dist
          sha256sum *.tar.gz > checksums.txt
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" dist/* \
            --repo "$GITHUB_REPOSITORY" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
